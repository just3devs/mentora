name: Mentora CI/CD Pipeline

on:
  push:
    branches: [ main, dev, 'fix' ]
  pull_request:
    branches: [ main ]

env:
  APP: "mentora"
  VERSION: "0.0.1"
  NAMESPACE_DEV: "mentora-dev"
  DOCKER_SERVER: ghcr.io

jobs:
  # Frontend Build
  dev-frontend-build:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Backend Build
  dev-backend-build:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: mvn clean package -DskipTests

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # Docker Build and Push
  dev-build-docker-image:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/fix'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_SERVER }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          IMAGE_TAG="${{ env.DOCKER_SERVER }}/${{ github.repository }}-dev:${{ env.VERSION }}-${{ github.run_id }}"
          docker build -t ${IMAGE_TAG} .
          docker push ${IMAGE_TAG}
          echo "image ${IMAGE_TAG} pushed"

  # Kubernetes Deployment
  dev-apply-deployment:
    runs-on: ubuntu-latest
    needs: dev-build-docker-image
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/fix'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          install_only: false
          cluster_name: mentora-dev

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Debug kubectl config
        run: |
          echo "--- Kubeconfig file content ---"
          cat $HOME/.kube/config || echo "Using KinD default kubeconfig"
          echo "--- kubectl config view ---"
          kubectl config view

      - name: Deploy to Kubernetes
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP: ${{ env.APP }}
          NAMESPACE: ${{ env.NAMESPACE_DEV }}
        run: |
          IMAGE_TAG="${{ env.DOCKER_SERVER }}/${{ github.repository }}-dev:${{ env.VERSION }}-${{ github.run_id }}"
          export IMAGE="${IMAGE_TAG}"
          envsubst < kubernetes/deployment.yaml > kubernetes/deployment.generated.yaml
          kubectl apply -f kubernetes/deployment.generated.yaml --validate=false
          echo "Application deployed with image: ${IMAGE_TAG}"