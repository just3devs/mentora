name: Mentora CI/CD Pipeline

on:
  push:
    branches: [ main, dev, 'fix' ]
  pull_request:
    branches: [ main ]

env:
  APP: "mentora"
  VERSION: "0.0.1"
  NAMESPACE_DEV: "mentora-dev"
  DOCKER_SERVER: ghcr.io

jobs:
  # Frontend Build
  dev-frontend-build:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Backend Build
  dev-backend-build:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: mvn clean package -DskipTests

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # Docker Build and Push - Frontend
  dev-build-frontend-docker:
    runs-on: ubuntu-latest
    needs: [dev-frontend-build]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/fix'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_SERVER }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend Docker image
        run: |
          FRONTEND_IMAGE_TAG="${{ env.DOCKER_SERVER }}/${{ github.repository }}-frontend:${{ env.VERSION }}-${{ github.run_id }}"
          docker build -t ${FRONTEND_IMAGE_TAG} ./frontend
          docker push ${FRONTEND_IMAGE_TAG}
          echo "Frontend image ${FRONTEND_IMAGE_TAG} pushed"

  # Docker Build and Push - Backend
  dev-build-backend-docker:
    runs-on: ubuntu-latest
    needs: [dev-backend-build]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/fix'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_SERVER }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        run: |
          BACKEND_IMAGE_TAG="${{ env.DOCKER_SERVER }}/${{ github.repository }}-backend:${{ env.VERSION }}-${{ github.run_id }}"
          docker build -t ${BACKEND_IMAGE_TAG} ./backend
          docker push ${BACKEND_IMAGE_TAG}
          echo "Backend image ${BACKEND_IMAGE_TAG} pushed"

  # Kubernetes Deployment
  dev-apply-deployment:
    runs-on: ubuntu-latest
    needs: [dev-build-frontend-docker, dev-build-backend-docker]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/fix'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install latest kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create KinD cluster
        run: |
          kind create cluster --name mentora-dev

      - name: Set kubeconfig context to KinD
        run: |
          kubectl config use-context kind-mentora-dev

      - name: Debug kubectl config
        run: |
          echo "--- Kubeconfig file content ---"
          cat $HOME/.kube/config || echo "Using KinD default kubeconfig"
          echo "--- kubectl config view ---"
          kubectl config view

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE_DEV }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=POSTGRES_USER="${POSTGRES_USER}" \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY}" \
            --namespace=${{ env.NAMESPACE_DEV }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          FRONTEND_IMAGE_TAG="${{ env.DOCKER_SERVER }}/${{ github.repository }}-frontend:${{ env.VERSION }}-${{ github.run_id }}"
          BACKEND_IMAGE_TAG="${{ env.DOCKER_SERVER }}/${{ github.repository }}-backend:${{ env.VERSION }}-${{ github.run_id }}"
          
          export FRONTEND_IMAGE="${FRONTEND_IMAGE_TAG}"
          export BACKEND_IMAGE="${BACKEND_IMAGE_TAG}"
          export NAMESPACE="${{ env.NAMESPACE_DEV }}"
          
          envsubst < kubernetes/deployment.yaml > kubernetes/deployment.generated.yaml
          
          echo "Generated deployment file:"
          cat kubernetes/deployment.generated.yaml
          
          kubectl apply -f kubernetes/deployment.generated.yaml
          echo "Frontend deployed with image: ${FRONTEND_IMAGE_TAG}"
          echo "Backend deployed with image: ${BACKEND_IMAGE_TAG}"