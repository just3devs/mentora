services:
  postgres:
    image: postgres:15
    container_name: mentora-postgres
    environment:
      POSTGRES_USER: postgresuser
      POSTGRES_PASSWORD: postgressecret
      POSTGRES_DB: mentora
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgresuser -d mentora -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: mentora-zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    image: mentora-backend:dev
    container_name: mentora-backend
    depends_on:
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    

volumes:
  pgdata: {}
