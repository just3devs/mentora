<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>API Docs</title>
    <!-- Scalar UI script -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference/dist/browser/standalone.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
        }
        #app {
            height: 100vh;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        if (!window.ScalarApiReference) {
            document.getElementById('app').innerHTML =
                "<pre style='color:red;padding:16px'>ScalarApiReference not loaded!</pre>";
            return;
        }
        window.ScalarApiReference.render({
            specUrl: '/v3/api-docs.yaml',   // Springdoc OpenAPI endpoint
            theme: 'kepler'                 // modern theme (kepler, purple, default)
        }, document.getElementById('app'));
    });
</script>
</body>
</html>
