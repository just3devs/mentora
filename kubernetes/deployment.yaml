apiVersion: v1
kind: Service
metadata:
  name: mentora-backend
  namespace: ${NAMESPACE}
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: mentora-backend

---

apiVersion: v1
kind: Service
metadata:
  name: mentora-frontend
  namespace: ${NAMESPACE}
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: mentora-frontend

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentora-backend
  namespace: ${NAMESPACE}
spec:
  selector:
    matchLabels:
      app: mentora-backend
  replicas: 1
  template:
    metadata:
      labels:
        app: mentora-backend
    spec:
      containers:
        - image: ${BACKEND_IMAGE}
          name: mentora-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentora-frontend
  namespace: ${NAMESPACE}
spec:
  selector:
    matchLabels:
      app: mentora-frontend
  replicas: 1
  template:
    metadata:
      labels:
        app: mentora-frontend
    spec:
      containers:
        - image: ${FRONTEND_IMAGE}
          name: mentora-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            # Add frontend environment variables here if needed
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5